name: Announcements
description: Make an announcement
labels: ["announcement"]
body:
  - type: dropdown
    id: severity
    attributes:
      label: severity
      options:
        - info
        - warning
        - Critical
    validations:
      required: true

  - type: textarea
    id: body
    attributes:
      label: Announcement title
      description: Will be displayed on the status page, must be in plain text
      placeholder: |
        Ex) There will be a regularly maintanance job from 02:00 to 04:00 on 1 Jan 2026.
        You may experience some service distruptions.
    validations:
      required: true

  - type: input
    id: expires
    attributes:
      label: expires (optional)
      description: If not being left as blank, the announcement will be automatically closed after the specified date.
      placeholder: "YYYY-MM-DD"

  - type: checkboxes
    id: confirm
    attributes:
      label: confirm
      options:
        - label: I double-checked the content of this announcement.
          required: true
---
