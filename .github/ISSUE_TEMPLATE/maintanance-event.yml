name: Maintenance Event
description: Schedule a planned maintenance window.
labels: ["maintenance", "announcement", "warning"]
body:
  - type: markdown
    attributes:
      value: |
        > **Do not edit the HTML comment block** — it is parsed automatically by Upptime to schedule the maintenance window.

  - type: input
    id: start
    attributes:
      label: Start Time (UTC)
      description: When does the maintenance window begin? Use ISO 8601 format.
      placeholder: "2025-03-30T17:00:00.000Z"
    validations:
      required: true

  - type: input
    id: end
    attributes:
      label: End Time (UTC)
      placeholder: "2025-03-30T19:00:00.000Z"
    validations:
      required: true

  - type: input
    id: expires
    attributes:
      label: Announcement Expiry Date
      description: The announcement banner will auto-close after this date. Use the same date as the maintenance end day.
      placeholder: "2025-03-30"
    validations:
      required: true

  - type: dropdown
    id: expected-down
    attributes:
      label: Affected Services
      description: Select all services that will be unavailable during maintenance.
      multiple: true
      options:
        - Main Page
        - User Page
        - Generic API
        - Streaming API
        - ActivityPub
        - All Services
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Describe the maintenance work. This will appear in the announcement banner.
      placeholder: |
        Reason: OS upgrade on all production nodes
        Impact: Full service outage during the window
        Owner: Infrastructure team
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Checklist
      options:
        - label: I have added `[expires YYYY-MM-DD]` to the issue title.
          required: true
        - label: I have notified the team of this maintenance window.
          required: true
