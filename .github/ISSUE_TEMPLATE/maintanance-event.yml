name: Maintenance Event
description: Schedule a planned maintenance window.
labels: ["maintenance", "announcement", "warning"]
body:
  - type: markdown
    attributes:
      value: |
        > **Do not edit the HTML comment block** — it is parsed automatically by Upptime to schedule the maintenance window.
        > **Do not add `[expires YYYY-MM-DD]` to the issue title manually** ― the Maintenance management CI will do it for you.
        > Times are in **KST (UTC+9)**. They will be automatically converted to UTC.

  - type: input
    id: start
    attributes:
      label: Start Time (KST)
      description: When does the maintenance window begin? (in KST)
      placeholder: "2025-03-30 17:00"
    validations:
      required: true

  - type: input
    id: end
    attributes:
      label: End Time (KST)
      description: When does the maintenance window end? (in KST)
      placeholder: "2025-03-30 19:00"
    validations:
      required: true

  - type: input
    id: expires
    attributes:
      label: Expires On
      description: The announcement banner will auto-close after this date. Use the same date as the maintenance end day.
      placeholder: "2025-03-30"
    validations:
      required: true

  - type: dropdown
    id: expected-down
    attributes:
      label: Expected Down Services
      description: Select all services that will be **completely unavailable** during maintenance.
      multiple: true
      options:
        - Main Page
        - User Page
        - Generic API
        - Streaming API
        - ActivityPub
    validations:
      required: false

  - type: dropdown
    id: expected-degraded
    attributes:
      label: Expected Degraded Services
      description: Select all services that will experience **degraded performance** during maintenance.
      multiple: true
      options:
        - Main Page
        - User Page
        - Generic API
        - Streaming API
        - ActivityPub
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        > At least one of **Expected Down Services** or **Expected Degraded Services** must be selected.

  - type: textarea
    id: descriptions
    attributes:
      label: Descriptions
      description: Describe the maintenance work. This will appear in the announcement banner.
      placeholder: |
        Reason: OS upgrade on all production nodes
        Impact: Full service outage during the window
        Owner: Infrastructure team
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Checklist
      options:
        - label: I have notified the team of this maintenance window.
          required: true
