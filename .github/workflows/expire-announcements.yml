name: Announcements Expiration CI

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  expire:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Close expired announcement issues
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          REPO: ${{ github.repository }}
        run: |
          TODAY=$(date -u +%Y%m%d)
          echo "Today: $TODAY"

          # announcement 이슈: 본문 ### Expires On (Optional) 섹션 파싱
          ISSUE_NUMBERS=$(gh api \
            "repos/$REPO/issues?labels=announcement&state=open&per_page=50" \
            --jq '[.[] | select(.labels | map(.name) | contains(["maintenance"]) | not)] | .[].number')

          for NUM in $ISSUE_NUMBERS; do
            FULL_BODY=$(gh api "repos/$REPO/issues/$NUM" --jq '.body')
            EXP=$(echo "$FULL_BODY" \
              | awk '/### Expires On \(Optional\)/{found=1; next} /### /{found=0} found && NF{print; exit}' \
              | tr -d ' \n\r')
            EXP_NUM=$(echo "$EXP" | tr -d '-')
            echo "Announcement issue #$NUM expires: $EXP (→ $EXP_NUM) / today: $TODAY"

            if [[ -n "$EXP_NUM" && "$EXP_NUM" =~ ^[0-9]{8}$ && "$EXP_NUM" -lt "$TODAY" ]]; then
              echo "Closing issue #$NUM (expired: $EXP)"
              gh api "repos/$REPO/issues/$NUM" \
                --method PATCH \
                --field state=closed
              gh api "repos/$REPO/issues/$NUM/comments" \
                --method POST \
                --field body="📅 This announcement has been automatically closed as the expiry date ($EXP) has passed."
            else
              echo "⏭️ Issue #$NUM not yet expired"
            fi
          done

      - name: Close expired maintenance issues
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          REPO: ${{ github.repository }}
        run: |
          TODAY=$(date -u +%Y%m%d)
          echo "Today: $TODAY"

          # maintenance 이슈: 본문 주석 블록의 expires: YYYY-MM-DD 파싱
          ISSUE_NUMBERS=$(gh api \
            "repos/$REPO/issues?labels=maintenance&state=open&per_page=50" \
            --jq '.[].number')

          for NUM in $ISSUE_NUMBERS; do
            FULL_BODY=$(gh api "repos/$REPO/issues/$NUM" --jq '.body')
            EXP=$(echo "$FULL_BODY" | grep -oP '(?<=expires: )[0-9]{4}-[0-9]{2}-[0-9]{2}')
            EXP_NUM=$(echo "$EXP" | tr -d '-' | tr -d ' \n\r')
            echo "Maintenance issue #$NUM expires: $EXP (→ $EXP_NUM) / today: $TODAY"

            if [[ -n "$EXP_NUM" && "$EXP_NUM" =~ ^[0-9]{8}$ && "$EXP_NUM" -lt "$TODAY" ]]; then
              echo "Closing issue #$NUM (expired: $EXP)"
              gh api "repos/$REPO/issues/$NUM" \
                --method PATCH \
                --field state=closed
              gh api "repos/$REPO/issues/$NUM/comments" \
                --method POST \
                --field body="📅 This maintenance window has been automatically closed as the expiry date ($EXP) has passed."
            else
              echo "⏭️ Issue #$NUM not yet expired"
            fi
          done
