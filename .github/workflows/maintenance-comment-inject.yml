name: Maintenance Management CI

on:
  issues:
    types: [opened]
  workflow_dispatch:

jobs:
  inject:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check maintenance label
        if: github.event_name == 'issues'
        id: check
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          LABELS=$(gh api "repos/$REPO/issues/$ISSUE_NUMBER" --jq '[.labels[].name] | join(",")')
          echo "labels=$LABELS" >> $GITHUB_OUTPUT
          if [[ "$LABELS" == *"maintenance"* ]]; then
            echo "is_maintenance=true" >> $GITHUB_OUTPUT
          else
            echo "is_maintenance=false" >> $GITHUB_OUTPUT
          fi
      - name: Parse fields and inject comment block (single issue)
        if: github.event_name == 'issues' && steps.check.outputs.is_maintenance == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          parse_field() {
            local label="$1"
            echo "$ISSUE_BODY" \
              | grep -A5 "### ${label}" \
              | tail -n +2 \
              | grep -v '^\s*$' \
              | head -1 \
              | xargs
          }

          kst_to_utc() {
            date -u -d "$1 +0900" '+%Y-%m-%dT%H:%M:%S.000Z'
          }

          START_KST=$(parse_field "Start Time (KST)")
          END_KST=$(parse_field "End Time (KST)")
          EXPIRES=$(parse_field "Expires On")

          echo "Start (KST): '$START_KST'"
          echo "End   (KST): '$END_KST'"
          echo "Expires:     '$EXPIRES'"

          START=$(kst_to_utc "$START_KST")
          END=$(kst_to_utc "$END_KST")

          if [[ -z "$START" || -z "$END" ]]; then
            echo "❌ Failed to convert times."
            exit 1
          fi

          echo "Start (UTC): $START"
          echo "End   (UTC): $END"

          SERVICES_RAW=$(echo "$ISSUE_BODY" \
            | awk '/### Affected Services/{found=1; next} /### Descriptions/{found=0} found && /^- /{print}' \
            | sed 's/^- //' \
            | tr '\n' ',')

          SERVICES=$(echo "$SERVICES_RAW" \
            | sed 's/Main Page/main-page/g' \
            | sed 's/User Page/user-page/g' \
            | sed 's/Generic API/generic-api/g' \
            | sed 's/Streaming API/streaming-api/g' \
            | sed 's/ActivityPub/activitypub/g' \
            | sed 's/All Services/*/g' \
            | sed 's/,$//' \
            | sed 's/, */,/g')

          if [[ -n "$EXPIRES" && "$EXPIRES" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            CURRENT_TITLE=$(gh api "repos/$REPO/issues/$ISSUE_NUMBER" --jq '.title')
            if [[ "$CURRENT_TITLE" != *"[expires:"* ]]; then
              gh api "repos/$REPO/issues/$ISSUE_NUMBER" \
                --method PATCH \
                --field title="$CURRENT_TITLE [expires: $EXPIRES]"
              echo "✅ Title updated: $CURRENT_TITLE [expires: $EXPIRES]"
            fi
          else
            echo "⚠️ Expires '$EXPIRES' is invalid or empty, skipping title update."
          fi

          COMMENT_BLOCK="<!--
          start: ${START}
          end: ${END}
          expectedDown: ${SERVICES}
          -->"

          printf '%s' "$ISSUE_BODY" > /tmp/issue_body.txt
          printf '%s\n\n' "$COMMENT_BLOCK" > /tmp/comment_block.txt
          cat /tmp/comment_block.txt /tmp/issue_body.txt > /tmp/new_body.txt

          jq -Rs '{"body": .}' < /tmp/new_body.txt > /tmp/body.json

          gh api "repos/$REPO/issues/$ISSUE_NUMBER" \
            --method PATCH \
            --input /tmp/body.json

          echo "✅ Injected comment block into issue #$ISSUE_NUMBER"

      - name: Process all open maintenance issues (manual run)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          REPO: ${{ github.repository }}
        run: |
          kst_to_utc() {
            date -u -d "$1 +0900" '+%Y-%m-%dT%H:%M:%S.000Z'
          }

          parse_field() {
            local body="$1"
            local label="$2"
            echo "$body" \
              | grep -A5 "### ${label}" \
              | tail -n +2 \
              | grep -v '^\s*$' \
              | head -1 \
              | xargs
          }

          ISSUE_NUMBERS=$(gh api \
            "repos/$REPO/issues?labels=maintenance&state=open&per_page=50" \
            --jq '.[].number')

          for NUM in $ISSUE_NUMBERS; do
            echo "--- Processing issue #$NUM ---"
            BODY=$(gh api "repos/$REPO/issues/$NUM" --jq '.body')
            TITLE=$(gh api "repos/$REPO/issues/$NUM" --jq '.title')

            echo "=== Issue #$NUM body ==="
            echo "$BODY"
            echo "=== Grep Expires On ==="
            echo "$BODY" | grep -A5 '### Expires On'
            echo "=== parse_field result ==="
            EXPIRES_DEBUG=$(parse_field "$BODY" "Expires On")
            echo "EXPIRES: '$EXPIRES_DEBUG'"
            if [[ "$EXPIRES_DEBUG" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "regex PASS"
            else
              echo "regex FAIL"
            fi

            # 이미 주석 블록이 있으면 skip
            if echo "$BODY" | grep -q "^<!--"; then
              echo "⏭️ Issue #$NUM already has comment block, skipping."
              continue
            fi

            START_KST=$(parse_field "$BODY" "Start Time (KST)")
            END_KST=$(parse_field "$BODY" "End Time (KST)")
            EXPIRES=$(parse_field "$BODY" "Expires On")

            echo "Start (KST): '$START_KST'"
            echo "End   (KST): '$END_KST'"
            echo "Expires:     '$EXPIRES'"

            START=$(kst_to_utc "$START_KST")
            END=$(kst_to_utc "$END_KST")

            if [[ -z "$START" || -z "$END" ]]; then
              echo "❌ Issue #$NUM: Failed to convert times, skipping."
              continue
            fi

            SERVICES_RAW=$(echo "$ISSUE_BODY" \
            | awk '/### Affected Services/{found=1; next} /### Descriptions/{found=0} found && /^- /{print}' \
            | sed 's/^- //' \
            | tr '\n' ',')

            SERVICES=$(echo "$SERVICES_RAW" \
              | sed 's/Main Page/main-page/g' \
              | sed 's/User Page/user-page/g' \
              | sed 's/Generic API/generic-api/g' \
              | sed 's/Streaming API/streaming-api/g' \
              | sed 's/ActivityPub/activitypub/g' \
              | sed 's/All Services/*/g' \
              | sed 's/,$//' \
              | sed 's/, */,/g')

            if [[ -n "$EXPIRES" && "$EXPIRES" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              if [[ "$TITLE" != *"[expires:"* ]]; then
                gh api "repos/$REPO/issues/$NUM" \
                  --method PATCH \
                  --field title="$TITLE [expires: $EXPIRES]"
                echo "✅ Title updated: $TITLE [expires: $EXPIRES]"
              fi
            fi

            COMMENT_BLOCK="<!--
          start: ${START}
          end: ${END}
          expectedDown: ${SERVICES}
          -->"

            printf '%s' "$BODY" > /tmp/issue_body.txt
            printf '%s\n\n' "$COMMENT_BLOCK" > /tmp/comment_block.txt
            cat /tmp/comment_block.txt /tmp/issue_body.txt > /tmp/new_body.txt

            jq -Rs '{"body": .}' < /tmp/new_body.txt > /tmp/body.json

            gh api "repos/$REPO/issues/$NUM" \
              --method PATCH \
              --input /tmp/body.json

            echo "✅ Injected comment block into issue #$NUM"
          done
