name: Maintenance Management CI

on:
  issues:
    types: [opened]

jobs:
  inject:
    runs-on: ubuntu-latest
    # maintenance 라벨이 붙은 Issue에만 동작
    if: contains(github.event.issue.labels.*.name, 'maintenance')
    permissions:
      issues: write

    steps:
      - name: Parse fields and inject comment block
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # KST (YYYY-MM-DD HH:MM) → UTC ISO 8601 변환 함수
          kst_to_utc() {
            local kst="$1"
            date -u -d "$kst KST" '+%Y-%m-%dT%H:%M:%S.000Z' 2>/dev/null \
              || date -u -j -f "%Y-%m-%d %H:%M %Z" "$kst KST" '+%Y-%m-%dT%H:%M:%S.000Z'
          }

          START_KST=$(echo "$ISSUE_BODY" | grep -A2 '### Start Time' | tail -1 | xargs)
          END_KST=$(echo "$ISSUE_BODY"   | grep -A2 '### End Time'   | tail -1 | xargs)

          START=$(kst_to_utc "$START_KST")
          END=$(kst_to_utc "$END_KST")

          SERVICES_RAW=$(echo "$ISSUE_BODY" | grep -A20 '### Affected Services' \
            | grep -E '^- ' | sed 's/^- //' | tr '\n' ',')

          SERVICES=$(echo "$SERVICES_RAW" \
            | sed 's/Main Page/main-page/g' \
            | sed 's/User Page/user-page/g' \
            | sed 's/Generic API/generic-api/g' \
            | sed 's/Streaming API/streaming-api/g' \
            | sed 's/ActivityPub/activitypub/g' \
            | sed 's/All Services/*/g' \
            | sed 's/,$//' \
            | sed 's/, */,/g')

          if [[ -z "$START" || -z "$END" ]]; then
            echo "❌ Failed to parse or convert times. Input: '$START_KST', '$END_KST'"
            exit 1
          fi

          echo "Start (KST): $START_KST → UTC: $START"
          echo "End   (KST): $END_KST → UTC: $END"

          # Expires On 필드 파싱 후 제목에 자동 추가
          EXPIRES=$(echo "$ISSUE_BODY" | grep -A2 '### Expires On' | tail -1 | xargs)

          if [[ -n "$EXPIRES" && "$EXPIRES" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            CURRENT_TITLE=$(gh api "repos/$REPO/issues/$ISSUE_NUMBER" --jq '.title')
            if [[ "$CURRENT_TITLE" != *"[expires:"* ]]; then
              gh api "repos/$REPO/issues/$ISSUE_NUMBER" \
                --method PATCH \
                --field title="$CURRENT_TITLE [expires: $EXPIRES]"
              echo "✅ Added expires tag to title: $CURRENT_TITLE [expires: $EXPIRES]"
            fi
          fi

          # 주석 블록 생성 및 본문 삽입
          COMMENT_BLOCK="<!--
          start: ${START}
          end: ${END}
          expectedDown: ${SERVICES}
          -->"

          NEW_BODY="${COMMENT_BLOCK}

          ${ISSUE_BODY}"

          gh api "repos/$REPO/issues/$ISSUE_NUMBER" \
            --method PATCH \
            --field body="$NEW_BODY"

          echo "✅ Injected maintenance comment block into issue #$ISSUE_NUMBER"
