name: Maintenance Management CI

on:
  issues:
    types: [opened]

jobs:
  inject:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check maintenance label
        id: check
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          LABELS=$(gh api "repos/$REPO/issues/$ISSUE_NUMBER" --jq '[.labels[].name] | join(",")')
          echo "labels=$LABELS" >> $GITHUB_OUTPUT
          if [[ "$LABELS" == *"maintenance"* ]]; then
            echo "is_maintenance=true" >> $GITHUB_OUTPUT
          else
            echo "is_maintenance=false" >> $GITHUB_OUTPUT
          fi
      - name: Parse fields and inject comment block
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # 섹션 값 추출 함수 (### 섹션명 다음 첫 번째 비어 있지 않은 줄)
          parse_field() {
            local label="$1"
            echo "$ISSUE_BODY" \
              | grep -A5 "### ${label}" \
              | tail -n +2 \
              | grep -v '^\s*$' \
              | head -1 \
              | xargs
          }

          # KST → UTC ISO 8601 변환
          kst_to_utc() {
            date -u -d "$1 +0900" '+%Y-%m-%dT%H:%M:%S.000Z'
          }

          START_KST=$(parse_field "Start Time (KST)")
          END_KST=$(parse_field "End Time (KST)")
          EXPIRES=$(parse_field "Expires On")

          echo "Start (KST): '$START_KST'"
          echo "End   (KST): '$END_KST'"
          echo "Expires:     '$EXPIRES'"

          START=$(kst_to_utc "$START_KST")
          END=$(kst_to_utc "$END_KST")

          if [[ -z "$START" || -z "$END" ]]; then
            echo "❌ Failed to convert times."
            exit 1
          fi

          echo "Start (UTC): $START"
          echo "End   (UTC): $END"

          # Affected Services 파싱
          SERVICES_RAW=$(echo "$ISSUE_BODY" \
            | grep -A20 '### Affected Services' \
            | grep -E '^- ' \
            | sed 's/^- //' \
            | tr '\n' ',')

          SERVICES=$(echo "$SERVICES_RAW" \
            | sed 's/Main Page/main-page/g' \
            | sed 's/User Page/user-page/g' \
            | sed 's/Generic API/generic-api/g' \
            | sed 's/Streaming API/streaming-api/g' \
            | sed 's/ActivityPub/activitypub/g' \
            | sed 's/All Services/*/g' \
            | sed 's/,$//' \
            | sed 's/, */,/g')

          # 제목에 [expires: YYYY-MM-DD] 자동 추가
          if [[ -n "$EXPIRES" && "$EXPIRES" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            CURRENT_TITLE=$(gh api "repos/$REPO/issues/$ISSUE_NUMBER" --jq '.title')
            if [[ "$CURRENT_TITLE" != *"[expires:"* ]]; then
              gh api "repos/$REPO/issues/$ISSUE_NUMBER" \
                --method PATCH \
                --field title="$CURRENT_TITLE [expires: $EXPIRES]"
              echo "✅ Title updated: $CURRENT_TITLE [expires: $EXPIRES]"
            fi
          else
            echo "⚠️ Expires value '$EXPIRES' is invalid or empty, skipping title update."
          fi

          # 주석 블록 생성 및 본문 삽입
          COMMENT_BLOCK="<!--
          start: ${START}
          end: ${END}
          expectedDown: ${SERVICES}
          -->"
          NEW_BODY="${COMMENT_BLOCK}

          ${ISSUE_BODY}"

          # --field 대신 jq로 JSON 직접 생성해서 넘김
          printf '%s' "$NEW_BODY" | jq -Rs '{"body": .}' > /tmp/body.json

          gh api "repos/$REPO/issues/$ISSUE_NUMBER" \
            --method PATCH \
            --input /tmp/body.json

          echo "✅ Injected maintenance comment block into issue #$ISSUE_NUMBER"
