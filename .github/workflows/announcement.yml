name: Announcements CI

on:
  issues:
    types: [opened, edited, closed, reopened]
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Setup CI"
      - "Static Site CI"
    types:
      - completed

jobs:
  sync:
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Auto-label severity (single issue)
        if: |
          github.event_name == 'issues' &&
          !contains(github.event.issue.labels.*.name, 'maintenance')
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          SEVERITY=$(echo "$ISSUE_BODY" \
            | grep -A3 '### Severity' \
            | grep -E '^\s*(warning|critical)\s*$' \
            | xargs | tr '[:upper:]' '[:lower:]')

          if [[ "$SEVERITY" == "warning" || "$SEVERITY" == "critical" ]]; then
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/labels" \
              -d "{\"labels\":[\"$SEVERITY\"]}"
            echo "✅ Labeled issue #$ISSUE_NUMBER as $SEVERITY"
          else
            echo "ℹ️ Severity is info, no additional label needed"
          fi

      - name: Auto-label severity (all open announcements)
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          REPO: ${{ github.repository }}
        run: |
          ISSUES=$(gh api \
            "repos/$REPO/issues?labels=announcement&state=open&per_page=50" \
            --jq '[.[] | select(.labels | map(.name) | contains(["maintenance"]) | not)] | .[].number')

          for NUM in $ISSUES; do
            FULL_BODY=$(gh api "repos/$REPO/issues/$NUM" --jq '.body')
            EXISTING=$(gh api "repos/$REPO/issues/$NUM" --jq '[.labels[].name] | join(",")')

            SEVERITY=$(echo "$FULL_BODY" \
              | grep -A3 '### Severity' \
              | grep -E '^\s*(warning|critical)\s*$' \
              | xargs | tr '[:upper:]' '[:lower:]')

            if [[ "$SEVERITY" == "warning" || "$SEVERITY" == "critical" ]]; then
              if [[ "$EXISTING" != *"$SEVERITY"* ]]; then
                curl -s -X POST \
                  -H "Authorization: Bearer $GH_TOKEN" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/$REPO/issues/$NUM/labels" \
                  -d "{\"labels\":[\"$SEVERITY\"]}"
                echo "✅ Labeled issue #$NUM as $SEVERITY"
              else
                echo "⏭️ Issue #$NUM already has $SEVERITY"
              fi
            else
              echo "ℹ️ Issue #$NUM is info, no label needed"
            fi
          done

      - name: Generate announcements.json
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          REPO: ${{ github.repository }}
        run: |
          gh api \
            "repos/$REPO/issues?labels=announcement&state=open&per_page=10" \
            --jq '[.[] | {
              id:        .number,
              title:     .title,
              body: (
                .body |
                # announcement 이슈: ### Descriptions 섹션
                if test("### Descriptions") then
                  split("### Descriptions")[1]
                  | split("### Expires On")[0]
                  | split("### Checklist")[0]
                  | split("### Confirm")[0]
                  | gsub("^[\\r\\n]+|[\\r\\n]+$"; "")
                # maintenance 이슈: ### Details 섹션
                elif test("### Details") then
                  split("### Details")[1]
                  | split("### Checklist")[0]
                  | split("### Confirm")[0]
                  | gsub("^[\\r\\n]+|[\\r\\n]+$"; "")
                else "" end
              ),
              expires: (
                .body |
                if test("### Expires On \\(Optional\\)") then
                  split("### Expires On (Optional)")[1]
                  | split("###")[0]
                  | gsub("^[\\r\\n\\s]+|[\\r\\n\\s]+$"; "")
                elif test("### Expires On") then
                  split("### Expires On")[1]
                  | split("###")[0]
                  | gsub("^[\\r\\n\\s]+|[\\r\\n\\s]+$"; "")
                else "" end
              ),
              severity: (
                if (.labels | map(.name) | contains(["critical"])) then "critical"
                elif (.labels | map(.name) | contains(["warning"])) then "warning"
                else "info" end
              ),
              createdAt: .created_at,
              url:       .html_url
            }]' > announcements.json

          echo "✅ announcements.json generated:"
          cat announcements.json

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add announcements.json
          git diff --cached --quiet || \
            git commit -m "chore: sync announcements [skip ci]" && \
            git push
