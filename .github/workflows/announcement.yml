name: Announcements CI

on:
  issues:
    types: [opened, edited, closed, labeled, unlabeled, reopened]
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Setup CI"
      - "Static Site CI"
    types:
      - completed

jobs:
  sync:
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Auto-label severity
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          SEVERITY=$(echo "$ISSUE_BODY" \
            | grep -A3 '### Severity' \
            | grep -E '^\s*(warning|critical)\s*$' \
            | xargs | tr '[:upper:]' '[:lower:]')

          if [[ "$SEVERITY" == "warning" || "$SEVERITY" == "critical" ]]; then
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/labels" \
              -d "{\"labels\":[\"$SEVERITY\"]}"
            echo "✅ Labeled issue #$ISSUE_NUMBER as $SEVERITY"
          else
            echo "ℹ️ Severity is info, no additional label needed"
          fi

      - name: Generate announcements.json
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          REPO: ${{ github.repository }}
        run: |
          gh api \
            "repos/$REPO/issues?labels=announcement&state=open&per_page=10" \
            --jq '[.[] | {
              id:        .number,
              title:     (.title | gsub("\\[expires:[^\\]]+\\]"; "") | ltrimstr(" ") | rtrimstr(" ")),
              body:      (
                .body
                | split("### Descriptions")
                | if length > 1 then .[1] else "" end
                | split("### Expires On")[0]
                | gsub("^[\\r\\n]+|[\\r\\n]+$"; "")
              ),
              severity:  (
                .body
                | split("### Severity")
                | if length > 1 then .[1] else "" end
                | split("###")[0]
                | gsub("^[\\r\\n\\s]+|[\\r\\n\\s]+$"; "")
                | ascii_downcase
                | if . == "warning" then "warning"
                  elif . == "critical" then "critical"
                  else "info" end
              ),
              createdAt: .created_at,
              url:       .html_url
            }]' > announcements.json

          echo "✅ announcements.json generated:"
          cat announcements.json

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add announcements.json
          git diff --cached --quiet || \
            git commit -m "chore: sync announcements [skip ci]" && \
            git push
