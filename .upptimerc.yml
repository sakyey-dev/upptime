status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.sakyey.kr
  # baseUrl: /your-repo-name
  logoUrl: https://raw.githubusercontent.com/sakyey-dev/upptime/refs/heads/master/assets/sakyey_icon.svg
  faviconSvg: https://raw.githubusercontent.com/sakyey-dev/upptime/refs/heads/master/assets/sakyey_icon.svg
  name: sakyey.kr Status
  introTitle: "**사계 대광장(sakyey.kr)** 실시간 운영 현황"
  introMessage: "[사계 대광장](https://sakyey.kr)의 현재 **실시간** 운영 현황이에요. 서버가 아프거나 유지보수 작업 등으로 대광장 서비스가 중단되는 경우, 여기서 현재 서비스 상태 및 관련 안내를 확인하실 수 있어요. ― 서비스가 중단된 기간 동안 급한 사정이 있으시다면, [sakyey.official@gmail.com](mailto:sakyey.official@gmail.com)으로 문의해주세요!"
  theme: dark
  navbar:
    - title: Status
      href: /
    - title: Sakyey
      href: https://sakyey.kr
  robotsText: "User-agent: * \n Disallow: /"
  # customHeadHtml, customBodyHtml은 맨 위에 announcement 배너를 위한 editing임.
  customHeadHtml: |
    <style>
      #ann-wrap { margin: 8px 0; }
      .ann {
        display: flex; justify-content: space-between; align-items: flex-start;
        gap: 12px; padding: 12px 16px; margin-bottom: 8px;
        border-radius: 8px; font-size: 14px; line-height: 1.6;
      }
      .ann-info     { background:#e8f4fd; border-left:4px solid #1a73e8; }
      .ann-warning  { background:#fff8e1; border-left:4px solid #f59e0b; }
      .ann-critical { background:#fdecea; border-left:4px solid #d93025; }
      .ann-title    { font-weight:600; margin-bottom:3px; }
      .ann-meta     { font-size:12px; color:#777; margin-top:4px; }
      .ann-close    { background:none; border:none; cursor:pointer;
                      font-size:18px; color:#999; padding:0; flex-shrink:0; }
    </style>

  customBodyHtml: |
    <div id="ann-wrap"></div>
    <script>
    (async () => {
      const icons = { info:'ℹ️', warning:'⚠️', critical:'🚨' };
      const dismissed = JSON.parse(sessionStorage.getItem('ann-dismissed') || '[]');
      const base = location.origin +
        (location.pathname.endsWith('/') ? location.pathname : location.pathname + '/');

      try {
        const res  = await fetch(base + 'announcements.json?_=' + Date.now());
        if (!res.ok) return;
        const list = await res.json();
        const wrap = document.getElementById('ann-wrap');

        list.forEach(ann => {
          if (dismissed.includes(ann.id)) return;
          const icon = icons[ann.severity] || '📢';
          const preview = ann.body
            ? ann.body.replace(/\r?\n/g, ' ').substring(0, 180) +
              (ann.body.length > 180 ? '…' : '')
            : '';
          const date = new Date(ann.createdAt).toLocaleString('ko-KR', {
            year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit'
          });

          const el = document.createElement('div');
          el.className = `ann ann-${ann.severity}`;
          el.id = `ann-${ann.id}`;
          el.innerHTML = `
            <div style="flex:1">
              <div class="ann-title">${icon} ${ann.title}</div>
              ${preview ? `<div>${preview}</div>` : ''}
              <div class="ann-meta">
                ${date}
                &nbsp;·&nbsp;
                <a href="${ann.url}" target="_blank" rel="noopener">자세히 보기 →</a>
              </div>
            </div>
            <button class="ann-close" aria-label="닫기"
              onclick="
                this.closest('.ann').style.display='none';
                const d=JSON.parse(sessionStorage.getItem('ann-dismissed')||'[]');
                d.push(${ann.id});
                sessionStorage.setItem('ann-dismissed',JSON.stringify(d));
              ">✕</button>`;
          wrap.appendChild(el);
        });
      } catch (_) { /* announcements.json 없으면 조용히 무시 */ }
    })();
    </script>

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 3 * * *"
  staticSite: "0 2 * * *"
  summary: "0 0 * * *"
  updates: "30 3 * * *"
  uptime: "*/10 * * * *"

