  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.sakyey.kr
  # baseUrl: /your-repo-name
  logoUrl: https://raw.githubusercontent.com/sakyey-dev/upptime/refs/heads/master/assets/sakyey_icon.svg
  faviconSvg: https://raw.githubusercontent.com/sakyey-dev/upptime/refs/heads/master/assets/sakyey_icon.svg
  name: sakyey.kr Status
  introTitle: "**사계 대광장(sakyey.kr)** 실시간 운영 현황"
  introMessage: "[사계 대광장](https://sakyey.kr)의 현재 **실시간** 운영 현황이에요. 서버가 아프거나 유지보수 작업 등으로 대광장 서비스가 중단되는 경우, 여기서 현재 서비스 상태 및 관련 안내를 확인하실 수 있어요. ― 서비스가 중단된 기간 동안 급한 사정이 있으시다면, [sakyey.official@gmail.com](mailto:sakyey.official@gmail.com)으로 문의해주세요!"
  navbar:
    - title: Status
      href: /
    - title: Sakyey
      href: https://sakyey.kr
  #robotsText: "User-agent: * \n Disallow: /"
  # customHeadHtml, customBodyHtml은 맨 위에 announcement 배너를 위한 editing임.
  customHeadHtml: |
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
      #ann-wrap { margin: 16px 0 32px 0; }
      .ann {
        display: flex; justify-content: space-between; align-items: flex-start;
        gap: 12px; padding: 14px 18px; margin-bottom: 8px;
        border-radius: 8px; font-size: 14px; line-height: 1.6;
        box-sizing: border-box; width: 100%;
      }
      .ann:last-child { margin-bottom: 0; }
      .ann-info     { background: rgba(26,115,232,0.1); border-left: 4px solid #1a73e8; }
      .ann-warning  { background: rgba(245,158,11,0.1); border-left: 4px solid #f59e0b; }
      .ann-critical { background: rgba(217,48,37,0.1);  border-left: 4px solid #d93025; }
      .ann-title { font-weight: 600; margin-bottom: 4px; color: inherit; }
      .ann-body  { font-size: 13px; color: inherit; line-height: 1.7; margin-top: 4px; }
      .ann-body p  { margin: 2px 0; }
      .ann-body ul, .ann-body ol { margin: 4px 0; padding-left: 18px; }
      .ann-body li { margin: 2px 0; }
      .ann-body a  { color: inherit; text-decoration: underline; }
      .ann-body strong { font-weight: 600; }
      .ann-body code {
        background: rgba(0,0,0,0.08); border-radius: 3px;
        padding: 1px 5px; font-size: 12px; font-family: monospace;
      }
      .ann-meta { font-size: 11px; opacity: 0.55; margin-top: 6px; }
      .ann-meta a { color: inherit; text-decoration: underline; }
      .ann-close {
        background: none; border: none; cursor: pointer;
        font-size: 20px; color: inherit; opacity: 0.35;
        padding: 0; flex-shrink: 0; line-height: 1;
      }
      .ann-close:hover { opacity: 0.7; }
    </style>

  customBodyHtml: |
    <div id="ann-wrap" style="display:none"></div>
    <script>
    (async function() {
      var icons = { info: 'ℹ️', warning: '⚠️', critical: '🚨' };
      var dismissed = JSON.parse(sessionStorage.getItem('ann-dismissed') || '[]');
      var base = location.origin +
        (location.pathname.endsWith('/') ? location.pathname : location.pathname + '/');

      try {
        var res = await fetch(base + 'announcements.json?_=' + Date.now());
        if (!res.ok) return;
        var list = await res.json();
        if (!list.length) return;

        var wrap = document.getElementById('ann-wrap');
        var hasVisible = false;

        list.forEach(function(ann) {
          if (dismissed.indexOf(ann.id) !== -1) return;
          hasVisible = true;

          var icon = icons[ann.severity] || '📢';
          var date = new Date(ann.createdAt).toLocaleString('ko-KR', {
            year: 'numeric', month: 'long', day: 'numeric',
            hour: '2-digit', minute: '2-digit', hour12: false
          });

          var bodyHtml = '';
          if (ann.body) {
            bodyHtml = (typeof marked !== 'undefined')
              ? marked.parse(ann.body)
              : ann.body.replace(/&/g,'&amp;').replace(/</g,'&lt;')
                        .replace(/>/g,'&gt;').replace(/\r?\n/g,'<br>');
          }

          var el = document.createElement('div');
          el.className = 'ann ann-' + ann.severity;
          el.id = 'ann-' + ann.id;
          el.innerHTML =
            '<div style="flex:1;min-width:0">' +
              '<div class="ann-title">' + icon + ' ' + ann.title + '</div>' +
              (bodyHtml ? '<div class="ann-body">' + bodyHtml + '</div>' : '') +
              '<div class="ann-meta">' + date + '&nbsp;·&nbsp;' +
                '<a href="' + ann.url + '" target="_blank" rel="noopener">자세히 보기 →</a>' +
              '</div>' +
            '</div>' +
            '<button class="ann-close" aria-label="닫기" onclick="' +
              'this.closest(\'.ann\').style.display=\'none\';' +
              'var d=JSON.parse(sessionStorage.getItem(\'ann-dismissed\')||\'[]\');' +
              'd.push(' + ann.id + ');' +
              'sessionStorage.setItem(\'ann-dismissed\',JSON.stringify(d));' +
            '">✕</button>';
          wrap.appendChild(el);
        });

        if (!hasVisible) return;

        function tryInsert() {
          var header = document.querySelector('header');
          var article = document.querySelector('article.up') ||
                        document.querySelector('article.degraded') ||
                        document.querySelector('article.down') ||
                        document.querySelector('article');
          if (header && header.parentNode && article) {
            header.parentNode.insertBefore(wrap, header.nextSibling);
            wrap.style.display = 'block';
            return true;
          }
          return false;
        }

        if (!tryInsert()) {
          var observer = new MutationObserver(function() {
            if (tryInsert()) observer.disconnect();
          });
          observer.observe(document.body, { childList: true, subtree: true });
          setTimeout(function() {
            observer.disconnect();
            if (wrap.style.display === 'none') {
              var main = document.querySelector('main') || document.body;
              main.prepend(wrap);
              wrap.style.display = 'block';
            }
          }, 10000);
        }

      } catch(e) {}
    })();
    </script>

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 3 * * *"
  staticSite: "0 2 * * *"
  summary: "0 0 * * *"
  updates: "30 3 * * *"
  uptime: "*/10 * * * *"

