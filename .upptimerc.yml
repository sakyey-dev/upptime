status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.sakyey.kr
  # baseUrl: /your-repo-name
  logoUrl: https://raw.githubusercontent.com/sakyey-dev/upptime/refs/heads/master/assets/sakyey_icon.svg
  faviconSvg: https://raw.githubusercontent.com/sakyey-dev/upptime/refs/heads/master/assets/sakyey_icon.svg
  name: sakyey.kr Status
  introTitle: "**사계 대광장(sakyey.kr)** 실시간 운영 현황"
  introMessage: "[사계 대광장](https://sakyey.kr)의 현재 **실시간** 운영 현황이에요. 서버가 아프거나 유지보수 작업 등으로 대광장 서비스가 중단되는 경우, 여기서 현재 서비스 상태 및 관련 안내를 확인하실 수 있어요. ― 서비스가 중단된 기간 동안 급한 사정이 있으시다면, [sakyey.official@gmail.com](mailto:sakyey.official@gmail.com)으로 문의해주세요!"
  navbar:
    - title: Status
      href: /
    - title: Sakyey
      href: https://sakyey.kr
  robotsText: "User-agent: * \n Disallow: /"
  # customHeadHtml, customBodyHtml은 맨 위에 announcement 배너를 위한 editing임.
  customHeadHtml: |
    <style>
      #ann-wrap {
        margin: 0 0 16px 0;
      }
      .ann {
        display: flex; justify-content: space-between; align-items: flex-start;
        gap: 12px; padding: 12px 16px; margin-bottom: 8px;
        border-radius: 8px; font-size: 14px; line-height: 1.6;
      }
      .ann-info {
        background: rgba(26, 115, 232, 0.12);
        border-left: 4px solid #1a73e8;
        color: inherit;
      }
      .ann-warning {
        background: rgba(245, 158, 11, 0.12);
        border-left: 4px solid #f59e0b;
        color: inherit;
      }
      .ann-critical {
        background: rgba(217, 48, 37, 0.12);
        border-left: 4px solid #d93025;
        color: inherit;
      }
      .ann-title    { font-weight: 600; margin-bottom: 3px; color: inherit; }
      .ann-body     { margin-top: 6px; font-size: 13px; color: inherit;
                      line-height: 1.7; white-space: pre-wrap; }
      .ann-meta     { font-size: 12px; opacity: 0.6; margin-top: 4px; }
      .ann-meta a   { color: inherit; text-decoration: underline; opacity: 0.8; }
      .ann-close    { background: none; border: none; cursor: pointer;
                      font-size: 18px; color: inherit; opacity: 0.4;
                      padding: 0; flex-shrink: 0; line-height: 1; }
      .ann-close:hover { opacity: 0.8; }
    </style>

  customBodyHtml: |
    <div id="ann-wrap" style="display:none"></div>
    <script>
    (async () => {
      const icons = { info:'ℹ️', warning:'⚠️', critical:'🚨' };
      const dismissed = JSON.parse(sessionStorage.getItem('ann-dismissed') || '[]');
      const base = location.origin +
        (location.pathname.endsWith('/') ? location.pathname : location.pathname + '/');

      try {
        const res  = await fetch(base + 'announcements.json?_=' + Date.now());
        if (!res.ok) return;
        const list = await res.json();
        if (!list.length) return;

        const wrap = document.getElementById('ann-wrap');
        let hasVisible = false;

        list.forEach(ann => {
          if (dismissed.includes(ann.id)) return;
          hasVisible = true;
          const icon = icons[ann.severity] || '📢';
          const date = new Date(ann.createdAt).toLocaleString('ko-KR', {
            year:'numeric', month:'long', day:'numeric',
            hour:'2-digit', minute:'2-digit'
          });
          const safeBody = ann.body
            ? ann.body
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
            : '';

          const el = document.createElement('div');
          el.className = `ann ann-${ann.severity}`;
          el.id = `ann-${ann.id}`;
          el.innerHTML = `
            <div style="flex:1;min-width:0">
              <div class="ann-title">${icon} ${ann.title}</div>
              ${safeBody ? `<div class="ann-body">${safeBody}</div>` : ''}
              <div class="ann-meta">
                ${date}&nbsp;·&nbsp;
                <a href="${ann.url}" target="_blank" rel="noopener">자세히 보기 →</a>
              </div>
            </div>
            <button class="ann-close" aria-label="닫기"
              onclick="
                this.closest('.ann').style.display='none';
                const d=JSON.parse(sessionStorage.getItem('ann-dismissed')||'[]');
                d.push(${ann.id});
                sessionStorage.setItem('ann-dismissed',JSON.stringify(d));
              ">✕</button>`;
          wrap.appendChild(el);
        });

        if (!hasVisible) return;

        // "All systems operational" 배너 바로 위로 이동
        // Upptime status-page의 메인 컨텐츠 셀렉터를 순서대로 시도
        function insertAnnouncements() {
          const targets = [
            'section.status',          // 상태 섹션
            'main section:first-child',
            'main > div:first-child',
            'main',
            '.container',
          ];
          for (const sel of targets) {
            const el = document.querySelector(sel);
            if (el && el.parentNode) {
              el.parentNode.insertBefore(wrap, el);
              wrap.style.display = 'block';
              return true;
            }
          }
          return false;
        }

        // DOM이 완전히 로드될 때까지 재시도 (Svelte 렌더링 대기)
        if (!insertAnnouncements()) {
          let attempts = 0;
          const timer = setInterval(() => {
            attempts++;
            if (insertAnnouncements() || attempts > 20) {
              clearInterval(timer);
            }
          }, 200);
        }

      } catch (_) {}
    })();
    </script>

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 3 * * *"
  staticSite: "0 2 * * *"
  summary: "0 0 * * *"
  updates: "30 3 * * *"
  uptime: "*/10 * * * *"

